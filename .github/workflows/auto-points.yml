name: Auto Assign Story Points

on:
  issues:
    types: [opened, labeled, unlabeled]

jobs:
  assign-points:
    runs-on: ubuntu-latest

    steps:
      - name: Assign points based on label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);

            let points = null;

            if (labels.includes("XS")) points = 1;
            else if (labels.includes("S")) points = 2;
            else if (labels.includes("M")) points = 3;
            else if (labels.includes("L")) points = 5;
            else if (labels.includes("XL")) points = 8;

            if (points === null) return;

            const body = `**Story Points:** ${points}`;

            // Add/update comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: body
            });

            console.log(`Assigned ${points} points`);
