name: Estimate from size

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  assign-points:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      repository-projects: write

    steps:
      - name: Recalculate section estimates from Size
        uses: actions/github-script@v7
        env:
          PROJECTS_TOKEN_SET: ${{ secrets.PROJECTS_TOKEN != '' }}
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            if (process.env.PROJECTS_TOKEN_SET !== "true") {
              throw new Error(
                "Missing PROJECTS_TOKEN secret. Add a classic PAT from Swastikdave with project scope in repository secrets."
              );
            }

            const sizeMap = {
              XS: 1,
              S: 2,
              M: 3,
              L: 5,
              XL: 8
            };

            const projectOwner = "Swastikdave";
            const projectNumber = 1;
            const projectTitle = "Testing";

            const viewerData = await github.graphql(
              `
              query {
                viewer {
                  login
                  projectsV2(first: 100) {
                    nodes {
                      id
                      number
                      title
                    }
                  }
                }
              }
              `
            );

            const ownerProjectListData = await github.graphql(
              `
              query($owner: String!) {
                user(login: $owner) {
                  projectsV2(first: 100) {
                    nodes {
                      id
                      number
                      title
                    }
                  }
                }
              }
              `,
              { owner: projectOwner }
            );

            const viewerLogin = viewerData.viewer?.login || "unknown";
            const viewerProjects = viewerData.viewer?.projectsV2?.nodes || [];
            const ownerProjects = ownerProjectListData.user?.projectsV2?.nodes || [];

            const projectsById = new Map();
            for (const p of [...viewerProjects, ...ownerProjects]) {
              if (p?.id) {
                projectsById.set(p.id, p);
              }
            }
            const projects = Array.from(projectsById.values());

            console.log(
              `Viewer=${viewerLogin}, viewerProjects=${viewerProjects.length}, ownerProjects=${ownerProjects.length}`
            );

            const project = projects.find(p => p.number === projectNumber)
              || projects.find(p => p.title === projectTitle)
              || null;

            if (!project) {
              const known = projects.map(p => `${p.number}:${p.title}`).join(", ");
              console.log(
                `Project not found. Tried number=${projectNumber} and title='${projectTitle}'. Visible projects: ${known || "none"}`
              );
              return;
            }

            const projectId = project.id;

            const projectFieldsData = await github.graphql(
              `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    fields(first: 50) {
                      nodes {
                        __typename
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                        }
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
              `,
              { projectId }
            );

            const projectFields = projectFieldsData.node?.fields?.nodes || [];

            console.log(
              `Project fields: ${projectFields.map(f => `${f.name}(${f.__typename})`).join(", ")}`
            );

            const estimateField = projectFields.find(
              f => f.name === "Estimate"
            );

            if (!estimateField) {
              console.log("Estimate field not found");
              return;
            }

            const singleSelectFieldNames = projectFields
              .filter(f => f.__typename === "ProjectV2SingleSelectField")
              .map(f => f.name);

            // Prefer common names, then fallback to any single-select field that is not Size.
            const sectionFieldName = ["Status", "Section", "State", "Workflow", "Stage"].find(
              name => singleSelectFieldNames.includes(name)
            ) || singleSelectFieldNames.find(name => name !== "Size") || null;

            if (!sectionFieldName) {
              console.log(
                `No section field found. Single-select fields seen: ${singleSelectFieldNames.join(", ") || "none"}`
              );
              return;
            }

            console.log(`Using section field: ${sectionFieldName}`);

            const fetchItemsPage = async (after) => {
              return github.graphql(
                `
                query($projectId: ID!, $after: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $after) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          id
                          fieldValues(first: 50) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
                `,
                { projectId, after }
              );
            };

            let allItems = [];
            let after = null;

            while (true) {
              const page = await fetchItemsPage(after);
              const itemsConnection = page.node.items;
              allItems = allItems.concat(itemsConnection.nodes || []);

              if (!itemsConnection.pageInfo.hasNextPage) {
                break;
              }

              after = itemsConnection.pageInfo.endCursor;
            }

            const sectionTotals = {};
            const itemStates = [];

            for (const item of allItems) {
              let itemSection = null;
              let itemSize = null;

              for (const fv of item.fieldValues.nodes) {
                if (fv.field?.name === sectionFieldName) {
                  itemSection = fv.name;
                }
                if (fv.field?.name === "Size") {
                  itemSize = fv.name;
                }
              }

              if (!itemSection) {
                continue;
              }

              itemStates.push({ id: item.id, section: itemSection });

              if (itemSize && Object.hasOwn(sizeMap, itemSize)) {
                sectionTotals[itemSection] = (sectionTotals[itemSection] || 0) + sizeMap[itemSize];
              }
            }

            let updatedCount = 0;

            for (const state of itemStates) {
              const value = sectionTotals[state.section] || 0;

              await github.graphql(
                `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { number: $value }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
                `,
                {
                  projectId,
                  itemId: state.id,
                  fieldId: estimateField.id,
                  value
                }
              );

              updatedCount += 1;
            }

            console.log(
              `Updated ${updatedCount} items using section field ${sectionFieldName}`
            );
