name: Estimate from size

on:
  issues:
    types: [opened, edited]

jobs:
  assign-points:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      repository-projects: write

    steps:
      - name: Assign points from Size field
        uses: actions/github-script@v7
        with:
          script: |
            const issueNodeId = context.payload.issue.node_id;

            // Fetch project item + field values
            const data = await github.graphql(`
              query {
                node(id: "${issueNodeId}") {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                            }
                          }
                        }
                        project {
                          id
                          fields(first: 20) {
                            nodes {
                              ... on ProjectV2Field {
                                id
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const items = data.node.projectItems.nodes;

            if (!items.length) {
              console.log("Issue not in project yet");
              return;
            }

            const item = items[0];
            const projectId = item.project.id;

            //  Get Size value
            let sizeValue = null;

            for (const fv of item.fieldValues.nodes) {
              if (fv.field?.name === "Size") {
                sizeValue = fv.name;
                break;
              }
            }

            if (!sizeValue) {
              console.log("Size not set");
              return;
            }

            //  Mapping
            const sizeMap = {
              XS: 1,
              S: 2,
              M: 3,
              L: 5,
              XL: 8
            };

            const points = sizeMap[sizeValue];

            if (!points) {
              console.log("Invalid size:", sizeValue);
              return;
            }

            //  Find Estimate field
            const estimateField = item.project.fields.nodes.find(
              f => f.name === "Estimate"
            );

            if (!estimateField) {
              console.log("Estimate field not found");
              return;
            }

            //  Update Estimate
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${item.id}",
                  fieldId: "${estimateField.id}",
                  value: { number: ${points} }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `);

            console.log(` Size ${sizeValue} → ${points}`);
