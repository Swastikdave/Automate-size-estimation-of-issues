name: Get IDs

on:
  workflow_dispatch:

jobs:
  get-ids:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      repository-projects: read

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const result = await github.graphql(`
              query {
                viewer {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2Field {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            console.log(JSON.stringify(result, null, 2));
